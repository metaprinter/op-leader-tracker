<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OP Carddass Market Research — Trubbish Bin</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600;700&family=Bitter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a0e;
  --surface: #252517;
  --surface2: #2e2e1c;
  --gold: #c8a832;
  --gold-dim: #8a7422;
  --gold-bright: #e8c840;
  --text: #d4c89a;
  --text-dim: #8a8060;
  --red: #c44040;
  --green: #5a9a40;
  --blue: #4080c0;
  --cyan: #40a0a0;
  --purple: #8060b0;
  --orange: #c07030;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Bitter',Georgia,serif; min-height:100vh; }
.header { background:var(--surface); border-bottom:2px solid var(--gold-dim); padding:16px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.header h1 { font-family:'Press Start 2P',monospace; font-size:13px; color:var(--gold); letter-spacing:1px; }
.header .subtitle { font-size:12px; color:var(--text-dim); margin-left:auto; }
.nav-back { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--gold-dim); text-decoration:none; }
.nav-back:hover { color:var(--gold); }
.dashboard { max-width:1200px; margin:0 auto; padding:20px; }

/* Auth */
.auth-bar { background:var(--surface2); border-bottom:1px solid var(--gold-dim); padding:10px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; font-family:'JetBrains Mono',monospace; font-size:11px; }
.auth-bar button { font-family:'JetBrains Mono',monospace; font-size:11px; padding:6px 14px; border:1px solid var(--gold-dim); background:var(--surface); color:var(--gold); border-radius:3px; cursor:pointer; }
.auth-bar button:hover { background:var(--gold-dim); color:var(--bg); }
.auth-status { color:var(--text-dim); }
.auth-status.ok { color:var(--green); }

/* Toolbar */
.toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; align-items:center; }
.toolbar button, .toolbar label { font-family:'JetBrains Mono',monospace; font-size:10px; padding:6px 12px; border:1px solid var(--gold-dim); background:var(--surface); color:var(--text-dim); border-radius:3px; cursor:pointer; transition:all 0.2s; }
.toolbar button:hover, .toolbar label:hover { border-color:var(--gold); color:var(--text); }
.toolbar button.active { background:var(--gold-dim); color:var(--bg); border-color:var(--gold); font-weight:700; }
.toolbar button.danger { border-color:var(--red); color:var(--red); }
.toolbar button.danger:hover { background:var(--red); color:var(--bg); }
.toolbar .spacer { flex:1; }
.toolbar input[type="file"] { display:none; }
.toolbar input[type="text"] { font-family:'JetBrains Mono',monospace; font-size:11px; padding:5px 10px; border:1px solid var(--gold-dim); background:var(--bg); color:var(--text); border-radius:3px; width:200px; }

/* Tabs */
.tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:2px solid var(--gold-dim); }
.tab { font-family:'Press Start 2P',monospace; font-size:10px; padding:10px 18px; color:var(--text-dim); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.2s; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* KPIs */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
.kpi { background:var(--surface); border:1px solid var(--gold-dim); border-radius:4px; padding:14px 16px; text-align:center; }
.kpi .label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.kpi .value { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--gold-bright); }
.kpi .value.small { font-size:16px; }

/* Sections */
.section { background:var(--surface); border:1px solid var(--gold-dim); border-radius:4px; margin-bottom:20px; overflow:hidden; }
.section-title { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--gold); padding:12px 16px; border-bottom:1px solid var(--gold-dim); background:var(--surface2); letter-spacing:1px; }
.section-body { padding:16px; }

/* Charts */
.bar-chart { display:flex; flex-direction:column; gap:6px; }
.bar-row { display:flex; align-items:center; gap:8px; height:28px; }
.bar-label { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text); width:120px; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:22px; background:var(--bg); border-radius:2px; position:relative; overflow:hidden; }
.bar-fill { height:100%; border-radius:2px; transition:width 0.6s ease; position:relative; }
.bar-fill .bar-text { position:absolute; right:6px; top:50%; transform:translateY(-50%); font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--bg); font-weight:700; white-space:nowrap; }
.bar-value { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); width:90px; text-align:right; flex-shrink:0; }
.timeline-svg, .scatter-svg { width:100%; }
.legend { display:flex; gap:16px; flex-wrap:wrap; margin-top:8px; }
.legend-item { display:flex; align-items:center; gap:4px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); }
.legend-dot { width:10px; height:10px; border-radius:50%; }

/* Data table */
.data-table { width:100%; border-collapse:collapse; font-family:'JetBrains Mono',monospace; font-size:11px; }
.data-table th { text-align:left; padding:8px 10px; color:var(--gold); border-bottom:1px solid var(--gold-dim); font-size:10px; text-transform:uppercase; letter-spacing:1px; cursor:pointer; user-select:none; white-space:nowrap; }
.data-table th:hover { color:var(--gold-bright); }
.data-table th .sort-arrow { margin-left:4px; font-size:8px; }
.data-table td { padding:6px 10px; border-bottom:1px solid #2a2a1a; color:var(--text); }
.data-table tr:hover td { background:var(--surface2); }
.data-table .num { text-align:right; }
.data-table .price { color:var(--gold-bright); }
.data-table .pct { color:var(--text-dim); }

/* Editable data table */
#data-grid { overflow-x:auto; }
#data-grid table { min-width:1400px; }
#data-grid td { padding:4px 6px; font-size:10px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#data-grid td.editable { cursor:text; }
#data-grid td.editable:hover { background:var(--surface2); outline:1px dashed var(--gold-dim); }
#data-grid td input, #data-grid td select { font-family:'JetBrains Mono',monospace; font-size:10px; background:var(--bg); color:var(--text); border:1px solid var(--gold-dim); padding:2px 4px; width:100%; border-radius:2px; }
#data-grid .row-actions { white-space:nowrap; }
#data-grid .row-actions button { font-family:'JetBrains Mono',monospace; font-size:9px; padding:2px 6px; border:1px solid var(--gold-dim); background:var(--surface); color:var(--text-dim); border-radius:2px; cursor:pointer; margin:0 1px; }
#data-grid .row-actions button:hover { color:var(--text); border-color:var(--gold); }
#data-grid .row-actions button.del:hover { color:var(--red); border-color:var(--red); }
.pagination { display:flex; align-items:center; gap:8px; margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); }
.pagination button { font-family:'JetBrains Mono',monospace; font-size:10px; padding:4px 10px; border:1px solid var(--gold-dim); background:var(--surface); color:var(--text-dim); border-radius:3px; cursor:pointer; }
.pagination button:hover:not(:disabled) { color:var(--gold); border-color:var(--gold); }
.pagination button:disabled { opacity:0.3; cursor:default; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border:2px solid var(--gold-dim); border-radius:6px; padding:20px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h3 { font-family:'Press Start 2P',monospace; font-size:11px; color:var(--gold); margin-bottom:16px; }
.modal label { display:block; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); margin-bottom:4px; margin-top:10px; }
.modal input, .modal select { font-family:'JetBrains Mono',monospace; font-size:11px; background:var(--bg); color:var(--text); border:1px solid var(--gold-dim); padding:6px 8px; width:100%; border-radius:3px; }
.modal .modal-actions { display:flex; gap:8px; margin-top:16px; }
.modal .modal-actions button { font-family:'JetBrains Mono',monospace; font-size:11px; padding:8px 16px; border:1px solid var(--gold-dim); background:var(--surface); color:var(--gold); border-radius:3px; cursor:pointer; }
.modal .modal-actions button:hover { background:var(--gold-dim); color:var(--bg); }
.modal .modal-actions button.cancel { color:var(--text-dim); }

/* Two col */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media (max-width:768px) {
  .two-col { grid-template-columns:1fr; }
  .bar-label { width:80px; font-size:10px; }
  .kpi-row { grid-template-columns:repeat(2,1fr); }
  .tabs { overflow-x:auto; }
  .tab { font-size:8px; padding:8px 12px; }
}

/* Toast */
.toast { position:fixed; bottom:20px; right:20px; background:var(--surface2); border:1px solid var(--gold-dim); border-radius:4px; padding:10px 16px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--gold); z-index:2000; opacity:0; transform:translateY(10px); transition:all 0.3s; }
.toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>
<!-- Auth Bar -->
<div class="auth-bar" id="auth-bar">
  <button id="auth-btn" onclick="handleAuth()">Sign in with Google</button>
  <span class="auth-status" id="auth-status">Sign in to sync data with Google Drive</span>
</div>

<!-- Header -->
<div class="header">
  <a href="index.html" class="nav-back">← HUB</a>
  <h1>OP CARDDASS RESEARCH</h1>
  <span class="subtitle" id="record-count">— records</span>
</div>

<!-- Tabs -->
<div class="dashboard">
  <div class="tabs">
    <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">DASHBOARD</div>
    <div class="tab" data-tab="data" onclick="switchTab('data')">DATA</div>
  </div>

  <!-- Dashboard Tab -->
  <div class="tab-content active" id="tab-dashboard"></div>

  <!-- Data Tab -->
  <div class="tab-content" id="tab-data">
    <div class="toolbar" id="data-toolbar">
      <button onclick="addRow()">+ ADD ROW</button>
      <button onclick="exportTSV()">EXPORT TSV</button>
      <label>APPEND TSV<input type="file" accept=".tsv,.csv,.txt" onchange="importTSV(event,'append')"></label>
      <label>REPLACE TSV<input type="file" accept=".tsv,.csv,.txt" onchange="importTSV(event,'replace')"></label>
      <input type="text" id="search-input" placeholder="Search..." oninput="renderDataGrid()">
      <span class="spacer"></span>
      <button class="danger" onclick="confirmDeleteAll()">RESET ALL</button>
    </div>
    <div id="data-grid"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="edit-modal">
    <h3 id="modal-title">ADD RECORD</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px;">
      <div><label>Title</label><input id="f-title" style="grid-column:span 2"></div>
      <div><label>Grader</label><select id="f-grader"><option value="">—</option><option>PSA</option><option>CGC</option><option>BGS</option><option>ARS</option></select></div>
      <div><label>Grade</label><input id="f-grade" type="text" placeholder="e.g. 10, 9.5"></div>
      <div><label>Year</label><input id="f-year" type="text" placeholder="e.g. 2001"></div>
      <div><label>Character</label><input id="f-character" type="text" placeholder="e.g. Luffy"></div>
      <div><label>Descriptor</label><input id="f-descriptor" type="text" placeholder="e.g. Holo, Pristine"></div>
      <div><label>Sold Date</label><input id="f-soldDate" type="text" placeholder="e.g. May 8, 2026"></div>
      <div><label>Price ($)</label><input id="f-price" type="number" step="0.01"></div>
      <div><label>Type</label><select id="f-type"><option value="">—</option><option>Buy It Now</option><option value="or Best Offer">or Best Offer</option><option value="Auction">Auction</option></select></div>
      <div><label>Seller</label><input id="f-seller" type="text"></div>
      <div><label>Listing ID</label><input id="f-listingId" type="text"></div>
      <div><label>Week</label><input id="f-week" type="text" placeholder="e.g. 2026-05-04"></div>
    </div>
    <div class="modal-actions">
      <button onclick="saveModal()">SAVE</button>
      <button class="cancel" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
<script>
// ========== CONFIG ==========
const CLIENT_ID = '406228714733-s5jaq0bp4nl7uujdc35j51l8nj0cgagt.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FOLDER = 'SuperLuckyKat';
const DRIVE_FILE = 'carddass-research.json';
const PAGE_SIZE = 50;

let DATA = [];
let accessToken = null;
let driveFileId = null;
let sortCol = 'week';
let sortDir = -1;
let dataPage = 0;
let editIdx = -1;
let saveTimeout = null;

// ========== SEED DATA REMOVED — Use APPEND TSV to load initial data ==========
const SEED_DATA = [];

// ========== GOOGLE OAUTH ==========
function handleAuth() {
  if (accessToken) { signOut(); return; }
  const redirectUri = window.location.origin + window.location.pathname;
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(SCOPES)}`;
  window.location.href = authUrl;
}

function signOut() {
  accessToken = null;
  driveFileId = null;
  localStorage.removeItem('carddass_token');
  localStorage.removeItem('carddass_token_exp');
  document.getElementById('auth-btn').textContent = 'Sign in with Google';
  document.getElementById('auth-status').textContent = 'Signed out';
  document.getElementById('auth-status').className = 'auth-status';
}

function checkAuthRedirect() {
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.slice(1));
    accessToken = params.get('access_token');
    const expiresIn = parseInt(params.get('expires_in') || '3600');
    localStorage.setItem('carddass_token', accessToken);
    localStorage.setItem('carddass_token_exp', Date.now() + expiresIn * 1000);
    window.history.replaceState(null, '', window.location.pathname);
    onSignedIn();
  } else {
    const stored = localStorage.getItem('carddass_token');
    const exp = parseInt(localStorage.getItem('carddass_token_exp') || '0');
    if (stored && Date.now() < exp) {
      accessToken = stored;
      onSignedIn();
    } else {
      loadLocal();
    }
  }
}

async function onSignedIn() {
  document.getElementById('auth-btn').textContent = 'Sign Out';
  document.getElementById('auth-status').textContent = 'Loading from Drive...';
  document.getElementById('auth-status').className = 'auth-status';
  try {
    await ensureFolder();
    await loadFromDrive();
    document.getElementById('auth-status').textContent = `Synced · ${DRIVE_FILE}`;
    document.getElementById('auth-status').className = 'auth-status ok';
  } catch (e) {
    console.error('Drive load failed:', e);
    document.getElementById('auth-status').textContent = 'Drive error — using local data';
    document.getElementById('auth-status').className = 'auth-status';
    loadLocal();
  }
}

async function driveRequest(url, opts = {}) {
  const r = await fetch(url, { ...opts, headers: { Authorization: `Bearer ${accessToken}`, ...(opts.headers || {}) } });
  if (r.status === 401) { signOut(); throw new Error('Token expired'); }
  return r;
}

let folderId = null;
async function ensureFolder() {
  // Find or create SuperLuckyKat folder
  const q = encodeURIComponent(`name='${DRIVE_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const r = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const data = await r.json();
  if (data.files && data.files.length > 0) {
    folderId = data.files[0].id;
  } else {
    const cr = await driveRequest('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: DRIVE_FOLDER, mimeType: 'application/vnd.google-apps.folder' })
    });
    const cf = await cr.json();
    folderId = cf.id;
  }
}

async function loadFromDrive() {
  const q = encodeURIComponent(`name='${DRIVE_FILE}' and '${folderId}' in parents and trashed=false`);
  const r = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const data = await r.json();
  if (data.files && data.files.length > 0) {
    driveFileId = data.files[0].id;
    const fr = await driveRequest(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
    DATA = await fr.json();
  } else {
    // First time — seed with built-in data
    DATA = JSON.parse(JSON.stringify(SEED_DATA));
    await saveToDrive();
  }
  onDataLoaded();
}

async function saveToDrive() {
  if (!accessToken || !folderId) return;
  const body = JSON.stringify(DATA);
  if (driveFileId) {
    await driveRequest(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body
    });
  } else {
    const metadata = { name: DRIVE_FILE, parents: [folderId], mimeType: 'application/json' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', new Blob([body], { type: 'application/json' }));
    const r = await driveRequest('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST', body: form
    });
    const f = await r.json();
    driveFileId = f.id;
  }
}

function debounceSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    saveToDrive().then(() => toast('Saved to Drive')).catch(e => toast('Save failed'));
  }, 1500);
}

function loadLocal() {
  const stored = localStorage.getItem('carddass_data');
  DATA = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(SEED_DATA));
  onDataLoaded();
}

function saveLocal() {
  localStorage.setItem('carddass_data', JSON.stringify(DATA));
}

function persist() {
  saveLocal();
  if (accessToken) debounceSave();
}

function onDataLoaded() {
  document.getElementById('record-count').textContent = `${DATA.length} eBay Sold Comps`;
  renderDashboard();
  renderDataGrid();
}

// ========== TOAST ==========
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ========== TABS ==========
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${tab}`));
  if (tab === 'dashboard') renderDashboard();
}

// ========== DATA GRID (CRUD) ==========
const FIELDS = ['title','grader','grade','year','character','descriptor','soldDate','price','type','seller','listingId','week'];
const FIELD_LABELS = {title:'Title',grader:'Grader',grade:'Grade',year:'Year',character:'Char',descriptor:'Desc',soldDate:'Sold',price:'Price',type:'Type',seller:'Seller',listingId:'ID',week:'Week'};

function getFilteredData() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  if (!q) return DATA.map((r, i) => ({ ...r, _idx: i }));
  return DATA.map((r, i) => ({ ...r, _idx: i })).filter(r =>
    (r.title || '').toLowerCase().includes(q) ||
    (r.character || '').toLowerCase().includes(q) ||
    (r.seller || '').toLowerCase().includes(q) ||
    (r.grader || '').toLowerCase().includes(q) ||
    (r.listingId || '').includes(q)
  );
}

function renderDataGrid() {
  const filtered = getFilteredData();
  // Sort
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'price') { va = parseFloat(va) || 0; vb = parseFloat(vb) || 0; }
    else { va = (va || '').toString().toLowerCase(); vb = (vb || '').toString().toLowerCase(); }
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (dataPage >= totalPages) dataPage = Math.max(0, totalPages - 1);
  const pageData = filtered.slice(dataPage * PAGE_SIZE, (dataPage + 1) * PAGE_SIZE);

  let html = `<table class="data-table"><thead><tr><th style="width:40px">#</th>`;
  FIELDS.forEach(f => {
    const arrow = sortCol === f ? (sortDir === 1 ? '▲' : '▼') : '';
    html += `<th onclick="sortBy('${f}')">${FIELD_LABELS[f]}<span class="sort-arrow">${arrow}</span></th>`;
  });
  html += `<th>Actions</th></tr></thead><tbody>`;

  pageData.forEach(r => {
    const i = r._idx;
    html += `<tr>`;
    html += `<td class="num" style="color:var(--text-dim)">${i + 1}</td>`;
    FIELDS.forEach(f => {
      let v = r[f] ?? '';
      if (f === 'price') v = '$' + parseFloat(v || 0).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
      if (f === 'title') html += `<td title="${esc(r[f] || '')}" style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v)}</td>`;
      else html += `<td>${esc(v.toString())}</td>`;
    });
    html += `<td class="row-actions"><button onclick="editRow(${i})">✎</button><button class="del" onclick="deleteRow(${i})">✕</button></td>`;
    html += `</tr>`;
  });
  html += `</tbody></table>`;

  // Pagination
  html += `<div class="pagination">
    <button onclick="dataPage=0;renderDataGrid()" ${dataPage === 0 ? 'disabled' : ''}>⇤</button>
    <button onclick="dataPage--;renderDataGrid()" ${dataPage === 0 ? 'disabled' : ''}>←</button>
    <span>Page ${dataPage + 1} of ${totalPages} · ${filtered.length} records</span>
    <button onclick="dataPage++;renderDataGrid()" ${dataPage >= totalPages - 1 ? 'disabled' : ''}>→</button>
    <button onclick="dataPage=${totalPages - 1};renderDataGrid()" ${dataPage >= totalPages - 1 ? 'disabled' : ''}>⇥</button>
  </div>`;

  document.getElementById('data-grid').innerHTML = html;
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = col === 'price' ? -1 : 1; }
  renderDataGrid();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ========== MODAL CRUD ==========
function addRow() {
  editIdx = -1;
  document.getElementById('modal-title').textContent = 'ADD RECORD';
  FIELDS.forEach(f => { const el = document.getElementById(`f-${f}`); if (el) el.value = ''; });
  document.getElementById('modal-overlay').classList.add('show');
}

function editRow(i) {
  editIdx = i;
  const r = DATA[i];
  document.getElementById('modal-title').textContent = 'EDIT RECORD';
  FIELDS.forEach(f => { const el = document.getElementById(`f-${f}`); if (el) el.value = r[f] ?? ''; });
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function saveModal() {
  const rec = {};
  FIELDS.forEach(f => {
    const el = document.getElementById(`f-${f}`);
    rec[f] = el ? el.value.trim() : '';
  });
  rec.price = parseFloat(rec.price) || 0;
  // Auto-fill week from soldDate if blank
  if (!rec.week && rec.soldDate) {
    try {
      const d = new Date(rec.soldDate);
      if (!isNaN(d)) {
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        const mon = new Date(d.setDate(diff));
        rec.week = mon.toISOString().slice(0, 10);
      }
    } catch (e) {}
  }

  if (editIdx >= 0) {
    // Preserve fields not in the form
    DATA[editIdx] = { ...DATA[editIdx], ...rec };
  } else {
    DATA.unshift(rec);
  }
  closeModal();
  persist();
  onDataLoaded();
  toast(editIdx >= 0 ? 'Record updated' : 'Record added');
}

function deleteRow(i) {
  if (!confirm(`Delete "${DATA[i].title?.slice(0, 60)}"?`)) return;
  DATA.splice(i, 1);
  persist();
  onDataLoaded();
  toast('Record deleted');
}

function confirmDeleteAll() {
  if (!confirm('DELETE ALL DATA? This cannot be undone.')) return;
  if (!confirm('Are you REALLY sure? This will wipe all records.')) return;
  DATA = [];
  persist();
  onDataLoaded();
  toast('All data cleared');
}

// ========== TSV IMPORT/EXPORT ==========
function exportTSV() {
  const headers = ['Title','Grader','Grade','Year','Character','Descriptor','Sold Date','Price','Type','Condition','Seller','Feedback','Listing ID','URL','Week'];
  const keys = ['title','grader','grade','year','character','descriptor','soldDate','price','type','condition','seller','feedback','listingId','url','week'];
  let tsv = headers.join('\t') + '\n';
  DATA.forEach(r => {
    tsv += keys.map(k => (r[k] ?? '').toString().replace(/\t/g,' ').replace(/\n/g,' ')).join('\t') + '\n';
  });
  const blob = new Blob([tsv], { type: 'text/tab-separated-values' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'carddass-research-export.tsv';
  a.click();
  toast('TSV exported');
}

function importTSV(e, mode) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (ev) {
    const text = ev.target.result;
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { toast('Empty file'); return; }

    // Auto-detect delimiter: if first line has tabs, use TSV; otherwise try CSV
    const delim = lines[0].includes('\t') ? '\t' : ',';
    const parseLine = delim === '\t' ? l => l.split('\t') : parseCSVLine;

    const header = parseLine(lines[0]).map(h => h.trim().toLowerCase());
    const colMap = {};
    const fieldMap = { title:'title', grader:'grader', grade:'grade', year:'year', character:'character',
      descriptor:'descriptor', 'sold date':'soldDate', price:'price', type:'type', condition:'condition',
      seller:'seller', feedback:'feedback', 'listing id':'listingId', url:'url', week:'week' };
    header.forEach((h, i) => { if (fieldMap[h]) colMap[fieldMap[h]] = i; });

    const imported = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = parseLine(lines[i]);
      const rec = {};
      Object.entries(colMap).forEach(([field, idx]) => {
        let v = (cols[idx] || '').trim();
        if (field === 'price') { v = parseFloat(v.replace(/[$,]/g, '')) || 0; }
        rec[field] = v;
      });
      if (rec.title || rec.price) imported.push(rec);
    }

    if (imported.length === 0) { toast('No valid rows found'); return; }

    if (mode === 'replace') {
      if (!confirm(`Replace ALL data with ${imported.length} rows?`)) return;
      DATA = imported;
      persist();
      onDataLoaded();
      toast(`Replaced with ${imported.length} rows`);
    } else {
      // Append mode — deduplicate by listing ID
      const existingIds = new Set(DATA.map(r => r.listingId).filter(Boolean));
      const newRows = imported.filter(r => !r.listingId || !existingIds.has(r.listingId));
      const dupeCount = imported.length - newRows.length;
      if (newRows.length === 0) { toast(`All ${imported.length} rows already exist (matched by Listing ID)`); return; }
      const msg = dupeCount > 0
        ? `Append ${newRows.length} new rows? (${dupeCount} duplicates skipped by Listing ID)`
        : `Append ${newRows.length} new rows?`;
      if (!confirm(msg)) return;
      DATA = [...newRows, ...DATA];
      persist();
      onDataLoaded();
      toast(`Appended ${newRows.length} rows` + (dupeCount ? `, ${dupeCount} dupes skipped` : ''));
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function parseCSVLine(line) {
  const result = []; let current = ''; let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else current += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { result.push(current); current = ''; }
      else current += c;
    }
  }
  result.push(current);
  return result;
}

// ========== DASHBOARD RENDERING ==========
const fmt = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
const median = arr => { if (!arr.length) return 0; const s=[...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]; };
const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
const sum = arr => arr.reduce((a,b)=>a+b,0);
const groupBy = (arr, fn) => { const m={}; arr.forEach(r=>{const k=fn(r);(m[k]=m[k]||[]).push(r);}); return m; };
const pctBar = (val,max,color) => {
  const pct=Math.max(1,val/max*100);
  return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">
    ${pct>15?`<span class="bar-text">${val}</span>`:''}</div></div>`;
};

function detectLine(title) {
  const t = (title || '').toLowerCase();
  if (t.includes('hyper battle') || t.includes('grand line compilation') || t.includes('grand box') ||
      (t.includes('carddass') && t.includes('stage'))) return 'Hyper Battle';
  if (t.includes('miracle battle')) return 'Miracle Battle';
  if (t.includes('ar carddass') || (t.includes('ar ') && t.includes('carddass')) ||
      t.includes('ar c/') || t.includes('ar formation') || t.includes('art rare carddass')) return 'AR Carddass';
  if (t.includes('visual adventure') || t.includes('visualadventure') || t.includes('visual adv')) return 'Visual Adventure';
  if (t.includes('berry match')) return 'Berry Match';
  if (t.includes('onepy') || t.includes('bb match') || t.includes('very match') ||
      (t.includes('match promo') && (t.includes('2009') || t.includes('2010')))) return 'OnePy/Match';
  if (t.includes('episode selection')) return 'Episode Selection';
  return 'Other';
}

function detectListingType(type) {
  const t = (type || '').toLowerCase();
  if (t.includes('buy it now')) return 'BIN';
  if (t.includes('best offer')) return 'OBO';
  if (t.includes('bid') || t.match(/^\d+ bid/)) return 'Auction';
  return 'Other';
}

function normalizeChar(c) {
  if (!c) return '';
  const n = c.trim();
  // Normalize casing
  const map = {
    'luffy':'Luffy','LUFFY':'Luffy','nami':'Nami','NAMI':'Nami','zoro':'Zoro','ZORO':'Zoro',
    'hancock':'Hancock','HANCOCK':'Hancock','ace':'Ace','ACE':'Ace','shanks':'Shanks','SHANKS':'Shanks',
    'sanji':'Sanji','SANJI':'Sanji','chopper':'Chopper','CHOPPER':'Chopper','robin':'Robin','ROBIN':'Robin',
    'law':'Law','LAW':'Law','perona':'Perona','PERONA':'Perona','vivi':'Vivi','VIVI':'Vivi',
    'usopp':'Usopp','USOPP':'Usopp','mihawk':'Mihawk','MIHAWK':'Mihawk','buggy':'Buggy','BUGGY':'Buggy',
    'brook':'Brook','BROOK':'Brook','franky':'Franky','FRANKY':'Franky','smoker':'Smoker','SMOKER':'Smoker',
    'crocodile':'Crocodile','CROCODILE':'Crocodile','dragon':'Dragon','DRAGON':'Dragon',
    'doflamingo':'Doflamingo','DOFLAMINGO':'Doflamingo','shirahoshi':'Shirahoshi','SHIRAHOSHI':'Shirahoshi',
    'brogy':'Brogy','BROGY':'Brogy',
  };
  return map[n] || map[n.toUpperCase()] || n.charAt(0).toUpperCase() + n.slice(1).toLowerCase();
}

function normalizeGrader(g) {
  if (!g) return 'Raw';
  const u = g.trim().toUpperCase();
  if (u === 'PSA' || u === 'Psa') return 'PSA';
  if (u === 'CGC') return 'CGC';
  if (u === 'BGS') return 'BGS';
  if (u === 'ARS') return 'ARS';
  return g.trim() || 'Raw';
}

function renderDashboard() {
  const app = document.getElementById('tab-dashboard');
  if (DATA.length === 0) { app.innerHTML = '<p style="padding:40px;text-align:center;color:var(--text-dim)">No data loaded. Import a CSV or add records in the DATA tab.</p>'; return; }

  // Prepare normalized data
  const rows = DATA.map(r => ({
    ...r,
    price: parseFloat(r.price) || 0,
    grader: normalizeGrader(r.grader),
    char: normalizeChar(r.character),
    line: detectLine(r.title),
    lt: detectListingType(r.type),
    grade: r.grade ? r.grade.toString().trim() : '',
    year: (r.year || '').toString().trim(),
    week: (r.week || '').trim(),
    seller: (r.seller || '').trim(),
  }));

  const prices = rows.map(r => r.price);
  const totalVal = sum(prices);
  // Date range
  const weeks = rows.map(r => r.week).filter(Boolean).sort();
  const dateRange = weeks.length ? `${weeks[0].slice(0,7)} – ${weeks[weeks.length-1].slice(0,7)}` : '—';

  let html = '';

  // KPIs
  html += `<div class="kpi-row">
    <div class="kpi"><div class="label">Total Listings</div><div class="value">${rows.length}</div></div>
    <div class="kpi"><div class="label">Market Value</div><div class="value small">${fmt(totalVal)}</div></div>
    <div class="kpi"><div class="label">Median Price</div><div class="value small">${fmt(median(prices))}</div></div>
    <div class="kpi"><div class="label">Avg Price</div><div class="value small">${fmt(avg(prices))}</div></div>
    <div class="kpi"><div class="label">Date Range</div><div class="value small" style="font-size:11px">${dateRange}</div></div>
  </div>`;

  // Card Lines + Graders (two col)
  const byLine = groupBy(rows, r => r.line);
  const byGrader = groupBy(rows, r => r.grader);
  const lineColors = {'Hyper Battle':'var(--gold)','Miracle Battle':'var(--purple)','AR Carddass':'var(--cyan)','Visual Adventure':'var(--green)','Other':'var(--text-dim)','OnePy/Match':'var(--orange)','Berry Match':'var(--red)','Episode Selection':'var(--text-dim)'};
  const graderColors = {PSA:'var(--blue)',CGC:'var(--orange)',BGS:'var(--purple)',ARS:'var(--green)',Raw:'var(--text-dim)'};

  html += `<div class="two-col">`;
  html += `<div class="section"><div class="section-title">CARD LINES BY VOLUME</div><div class="section-body"><div class="bar-chart">`;
  const maxLineCount = Math.max(...Object.values(byLine).map(a => a.length));
  Object.entries(byLine).sort((a,b) => b[1].length - a[1].length).forEach(([line, recs]) => {
    const p = recs.map(r => r.price);
    html += `<div class="bar-row"><span class="bar-label">${line}</span>${pctBar(recs.length, maxLineCount, lineColors[line]||'var(--text-dim)')}<span class="bar-value">${fmt(median(p))} med</span></div>`;
  });
  html += `</div></div></div>`;

  html += `<div class="section"><div class="section-title">GRADERS BY VOLUME</div><div class="section-body"><div class="bar-chart">`;
  const maxGraderCount = Math.max(...Object.values(byGrader).map(a => a.length));
  Object.entries(byGrader).sort((a,b) => b[1].length - a[1].length).forEach(([g, recs]) => {
    const p = recs.map(r => r.price);
    html += `<div class="bar-row"><span class="bar-label">${g}</span>${pctBar(recs.length, maxGraderCount, graderColors[g]||'var(--text-dim)')}<span class="bar-value">${fmt(median(p))} med</span></div>`;
  });
  html += `</div></div></div>`;
  html += `</div>`;

  // Character table
  const byChar = groupBy(rows.filter(r => r.char), r => r.char);
  const charEntries = Object.entries(byChar).sort((a,b) => b[1].length - a[1].length).slice(0, 15);
  html += `<div class="section"><div class="section-title">CHARACTERS — WHO MOVES THE MARKET</div><div class="section-body">
    <table class="data-table"><thead><tr><th>Character</th><th class="num">Count</th><th class="num">Share</th><th class="num">Avg</th><th class="num">Median</th><th class="num">Max</th><th class="num">Total $</th></tr></thead><tbody>`;
  charEntries.forEach(([c, recs]) => {
    const p = recs.map(r => r.price);
    html += `<tr><td>${c}</td><td class="num">${recs.length}</td><td class="num pct">${(recs.length/rows.length*100).toFixed(1)}%</td>
      <td class="num price">${fmt(avg(p))}</td><td class="num price">${fmt(median(p))}</td>
      <td class="num price">${fmt(Math.max(...p))}</td><td class="num price">${fmt(sum(p))}</td></tr>`;
  });
  html += `</tbody></table></div></div>`;

  // Weekly trend
  const byWeek = groupBy(rows.filter(r => r.week), r => r.week);
  const allWeeks = Object.keys(byWeek).sort();
  const mainWeeks = allWeeks.filter(w => w >= '2026-02');
  html += `<div class="section"><div class="section-title">WEEKLY TREND — VOLUME & MEDIAN PRICE</div><div class="section-body">`;
  if (mainWeeks.length > 0) {
    const wData = mainWeeks.map(w => ({ w, count:byWeek[w].length, med:median(byWeek[w].map(r=>r.price)), total:sum(byWeek[w].map(r=>r.price)) }));
    const maxCount = Math.max(...wData.map(d => d.count));
    const maxMed = Math.max(...wData.map(d => d.med));
    const svgW=900,svgH=200,padL=50,padR=20,padT=20,padB=40;
    const chartW=svgW-padL-padR, chartH=svgH-padT-padB;
    const barW = Math.max(8, chartW/wData.length-4);
    html += `<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:200px" preserveAspectRatio="xMidYMid meet">`;
    for (let i=0;i<=4;i++) {
      const y=padT+chartH-(chartH*i/4), val=Math.round(maxCount*i/4);
      html += `<text x="${padL-5}" y="${y+3}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="9" text-anchor="end">${val}</text>`;
      html += `<line x1="${padL}" y1="${y}" x2="${svgW-padR}" y2="${y}" stroke="var(--surface2)" stroke-width="1"/>`;
    }
    let linePath='';
    wData.forEach((d,i) => {
      const x=padL+(i+0.5)*(chartW/wData.length);
      const barH=(d.count/maxCount)*chartH, barY=padT+chartH-barH;
      html += `<rect x="${x-barW/2}" y="${barY}" width="${barW}" height="${barH}" fill="var(--gold-dim)" opacity="0.7" rx="2"><title>${d.w}: ${d.count} listings, ${fmt(d.med)} median</title></rect>`;
      const lineY=padT+chartH-(d.med/maxMed)*chartH;
      linePath += (i===0?'M':'L')+`${x},${lineY}`;
      html += `<circle cx="${x}" cy="${lineY}" r="3" fill="var(--gold-bright)"><title>${d.w}: ${fmt(d.med)} median</title></circle>`;
      const label=d.w.slice(5);
      html += `<text x="${x}" y="${svgH-5}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="8" text-anchor="middle" transform="rotate(-45,${x},${svgH-5})">${label}</text>`;
    });
    html += `<path d="${linePath}" fill="none" stroke="var(--gold-bright)" stroke-width="2"/>`;
    html += `</svg>`;
    html += `<div class="legend"><span class="legend-item"><span class="legend-dot" style="background:var(--gold-dim)"></span> Weekly Volume</span><span class="legend-item"><span class="legend-dot" style="background:var(--gold-bright)"></span> Median Price</span></div>`;
  }
  html += `</div></div>`;

  // Scatter: Grade vs Price
  html += `<div class="section"><div class="section-title">PRICE BY GRADE — PSA vs CGC vs BGS</div><div class="section-body">`;
  const graded = rows.filter(r => r.grade && !isNaN(parseFloat(r.grade)));
  if (graded.length) {
    const svgW2=900,svgH2=320,padL2=60,padR2=30,padT2=20,padB2=40;
    const cW=svgW2-padL2-padR2, cH=svgH2-padT2-padB2;
    const maxP=Math.max(...graded.map(r=>r.price));
    const logMax=Math.log10(maxP+1);
    const grades=[5,6,6.5,7,7.5,8,8.5,9,9.5,10];
    const gradeMin=5,gradeMax=10;
    const colorMap={PSA:'#4080c0',CGC:'#c07030',BGS:'#8060b0',Raw:'#8a8060',ARS:'#5a9a40'};
    html += `<svg viewBox="0 0 ${svgW2} ${svgH2}" style="width:100%;height:320px" preserveAspectRatio="xMidYMid meet">`;
    [10,50,100,500,1000,5000,10000].forEach(v => {
      if (v<=maxP) {
        const y=padT2+cH-(Math.log10(v+1)/logMax)*cH;
        html += `<line x1="${padL2}" y1="${y}" x2="${svgW2-padR2}" y2="${y}" stroke="var(--surface2)" stroke-width="1"/>`;
        html += `<text x="${padL2-5}" y="${y+3}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="9" text-anchor="end">${fmt(v)}</text>`;
      }
    });
    grades.forEach(g => {
      const x=padL2+((g-gradeMin)/(gradeMax-gradeMin))*cW;
      html += `<text x="${x}" y="${svgH2-10}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="10" text-anchor="middle">${g}</text>`;
    });
    ['BGS','Raw','ARS','CGC','PSA'].forEach(grp => {
      graded.filter(r=>r.grader===grp).forEach(r => {
        const g=parseFloat(r.grade);
        const x=padL2+((g-gradeMin)/(gradeMax-gradeMin))*cW+(Math.random()-0.5)*12;
        const y=padT2+cH-(Math.log10(r.price+1)/logMax)*cH;
        html += `<circle cx="${x}" cy="${y}" r="4" fill="${colorMap[grp]||'#8a8060'}" opacity="0.6"><title>${r.grader} ${r.grade} | ${fmt(r.price)} | ${r.char}</title></circle>`;
      });
    });
    html += `</svg>`;
    html += `<div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#4080c0"></span> PSA</span><span class="legend-item"><span class="legend-dot" style="background:#c07030"></span> CGC</span><span class="legend-item"><span class="legend-dot" style="background:#8060b0"></span> BGS</span></div>`;
  }
  html += `</div></div>`;

  // Vintage premium
  const byYear = groupBy(rows.filter(r=>r.year), r=>r.year);
  const yearEntries = Object.entries(byYear).sort((a,b)=>a[0].localeCompare(b[0]));
  html += `<div class="section"><div class="section-title">VINTAGE PREMIUM — PRICE BY CARD YEAR</div><div class="section-body">
    <table class="data-table"><thead><tr><th>Year</th><th class="num">Count</th><th class="num">Avg</th><th class="num">Median</th><th class="num">Max</th></tr></thead><tbody>`;
  yearEntries.forEach(([y, recs]) => {
    const p=recs.map(r=>r.price);

    html += `<tr><td${isVintage?' style="color:var(--gold-bright);font-weight:700"':''}>${y}</td>

      <td class="num price">${fmt(median(p))}</td><td class="num price">${fmt(Math.max(...p))}</td></tr>`;
  });
  html += `</tbody></table></div></div>`;

  // Top sellers
  const bySeller = groupBy(rows.filter(r=>r.seller), r=>r.seller);
  const sellerEntries = Object.entries(bySeller).sort((a,b)=>b[1].length-a[1].length).slice(0,12);
  html += `<div class="section"><div class="section-title">TOP SELLERS — WHO'S DRIVING SUPPLY</div><div class="section-body">`;
  const maxSellerCount = Math.max(...sellerEntries.map(([,r])=>r.length));
  html += `<div class="bar-chart">`;
  sellerEntries.forEach(([s, recs]) => {
    const p=recs.map(r=>r.price);
    const graderCounts={};
    recs.forEach(r=>graderCounts[r.grader]=(graderCounts[r.grader]||0)+1);
    const topGrader=Object.entries(graderCounts).sort((a,b)=>b[1]-a[1])[0][0];
    const color=topGrader==='PSA'?'var(--blue)':topGrader==='CGC'?'var(--orange)':'var(--text-dim)';
    html += `<div class="bar-row"><span class="bar-label" title="${s}">${s.length>14?s.slice(0,13)+'…':s}</span>${pctBar(recs.length,maxSellerCount,color)}<span class="bar-value">${fmt(avg(p))} avg</span></div>`;
  });
  html += `</div><div class="legend" style="margin-top:12px"><span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span> Primarily PSA</span><span class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span> Primarily CGC</span></div></div></div>`;

  // Listing type + Price distribution (two col)
  const byLT = groupBy(rows, r=>r.lt);
  html += `<div class="two-col">`;
  html += `<div class="section"><div class="section-title">LISTING TYPE</div><div class="section-body">
    <table class="data-table"><thead><tr><th>Type</th><th class="num">Count</th><th class="num">Avg</th><th class="num">Median</th></tr></thead><tbody>`;
  ['Auction','BIN','OBO','Other'].forEach(lt => {
    if (byLT[lt]) {
      const p=byLT[lt].map(r=>r.price);
      html += `<tr><td>${lt}</td><td class="num">${byLT[lt].length}</td><td class="num price">${fmt(avg(p))}</td><td class="num price">${fmt(median(p))}</td></tr>`;
    }
  });
  html += `</tbody></table></div></div>`;

  const brackets=[[0,25],[25,50],[50,100],[100,200],[200,500],[500,1000],[1000,5000],[5000,100000]];
  html += `<div class="section"><div class="section-title">PRICE DISTRIBUTION</div><div class="section-body"><div class="bar-chart">`;
  const maxBracket=Math.max(...brackets.map(([lo,hi])=>rows.filter(r=>r.price>=lo&&r.price<hi).length));
  brackets.forEach(([lo,hi]) => {
    const ct=rows.filter(r=>r.price>=lo&&r.price<hi).length;
    const label=hi<100000?`$${lo.toLocaleString()}–$${hi.toLocaleString()}`:`$${lo.toLocaleString()}+`;
    html += `<div class="bar-row"><span class="bar-label">${label}</span>${pctBar(ct,maxBracket,'var(--gold-dim)')}<span class="bar-value">${(ct/rows.length*100).toFixed(0)}% (${ct})</span></div>`;
  });
  html += `</div></div></div>`;
  html += `</div>`;

  // Footer
  html += `<div style="text-align:center;padding:20px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)">
    Data: eBay Sold Comps · Managed by SuperLuckyKat · Dashboard by Trubbish Bin
  </div>`;

  app.innerHTML = html;
}

// ========== INIT ==========
checkAuthRedirect();
</script>
</body>
</html>
