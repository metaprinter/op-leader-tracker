<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OP Carddass Market Research — Trubbish Bin</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600;700&family=Bitter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a0e;
  --surface: #252517;
  --surface2: #2e2e1c;
  --gold: #c8a832;
  --gold-dim: #8a7422;
  --gold-bright: #e8c840;
  --text: #d4c89a;
  --text-dim: #8a8060;
  --red: #c44040;
  --green: #5a9a40;
  --blue: #4080c0;
  --cyan: #40a0a0;
  --purple: #8060b0;
  --orange: #c07030;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Bitter', Georgia, serif;
  min-height: 100vh;
}
.header {
  background: var(--surface);
  border-bottom: 2px solid var(--gold-dim);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 1px;
}
.header .subtitle {
  font-size: 12px;
  color: var(--text-dim);
  margin-left: auto;
}
.dashboard {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 14px 16px;
  text-align: center;
}
.kpi .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.kpi .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold-bright);
}
.kpi .value.small { font-size: 16px; }

.section {
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  margin-bottom: 20px;
  overflow: hidden;
}
.section-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--gold);
  padding: 12px 16px;
  border-bottom: 1px solid var(--gold-dim);
  background: var(--surface2);
  letter-spacing: 1px;
}
.section-body { padding: 16px; }

/* Charts */
.chart-container {
  position: relative;
  width: 100%;
  overflow-x: auto;
}
.bar-chart {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 28px;
}
.bar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text);
  width: 120px;
  text-align: right;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 22px;
  background: var(--bg);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
  position: relative;
}
.bar-fill .bar-text {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--bg);
  font-weight: 700;
  white-space: nowrap;
}
.bar-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  width: 90px;
  text-align: right;
  flex-shrink: 0;
}

/* Timeline chart */
.timeline-svg {
  width: 100%;
  height: 200px;
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.data-table th {
  text-align: left;
  padding: 8px 10px;
  color: var(--gold);
  border-bottom: 1px solid var(--gold-dim);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.data-table td {
  padding: 6px 10px;
  border-bottom: 1px solid #2a2a1a;
  color: var(--text);
}
.data-table tr:hover td { background: var(--surface2); }
.data-table .num { text-align: right; }
.data-table .price { color: var(--gold-bright); }
.data-table .pct { color: var(--text-dim); }

/* Scatter plot */
.scatter-svg {
  width: 100%;
  height: 300px;
}

/* Filter bar */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 6px 12px;
  border: 1px solid var(--gold-dim);
  background: var(--surface);
  color: var(--text-dim);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--gold); color: var(--text); }
.filter-btn.active {
  background: var(--gold-dim);
  color: var(--bg);
  border-color: var(--gold);
  font-weight: 700;
}

/* Two col layout */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 768px) {
  .two-col { grid-template-columns: 1fr; }
  .bar-label { width: 80px; font-size: 10px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}

/* Dot colors */
.dot-P { fill: var(--blue); }
.dot-C { fill: var(--orange); }
.dot-B { fill: var(--purple); }
.dot-other { fill: var(--text-dim); }

.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.nav-back {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--gold-dim);
  text-decoration: none;
}
.nav-back:hover { color: var(--gold); }
</style>
</head>

// Decode compact format
// [grader, grade, year, char, price, week, line, listingType, foil, seller]
const GRADER_MAP = {P:'PSA',C:'CGC',B:'BGS',A:'ARS','':'Raw'};
const LINE_MAP = {H:'Hyper Battle',M:'Miracle Battle',A:'AR Carddass',V:'Visual Adventure',
                  B:'Berry Match',O:'OnePy/Match',N:'OPTCG Modern',E:'Episode Selection',X:'Other'};
const CHAR_MAP = {LUF:'Luffy',NAM:'Nami',ZOR:'Zoro',HAN:'Hancock',ACE:'Ace',SHA:'Shanks',
                  SAN:'Sanji',CHO:'Chopper',ROB:'Robin',LAW:'Law',PER:'Perona',VIV:'Vivi',
                  USO:'Usopp',MIH:'Mihawk',BUG:'Buggy',BRO:'Brook',FRA:'Franky',SMO:'Smoker',
                  CRO:'Crocodile',DRA:'Dragon',DOF:'Doflamingo'};
const LT_MAP = {A:'Auction',B:'BIN',O:'OBO','':''};

const data = RAW.map(r => ({
  grader: GRADER_MAP[r[0]] || r[0] || 'Raw',
  grade: r[1], year: r[2],
  char: CHAR_MAP[r[3]] || r[3] || '',
  price: r[4], week: r[5],
  line: LINE_MAP[r[6]] || r[6],
  lt: LT_MAP[r[7]] || r[7],
  foil: r[8], seller: r[9]
}));

// Utility functions
const fmt = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
const median = arr => { const s = [...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]; };
const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
const sum = arr => arr.reduce((a,b)=>a+b,0);
const groupBy = (arr, fn) => {
  const m = {};
  arr.forEach(r => { const k = fn(r); (m[k] = m[k]||[]).push(r); });
  return m;
};
const pctBar = (val, max, color) => {
  const pct = Math.max(1, val/max*100);
  return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">
    ${pct > 15 ? `<span class="bar-text">${val}</span>` : ''}
  </div></div>`;
};

    <div class="kpi"><div class="label">Date Range</div><div class="value small" style="font-size:11px">Feb–May '26</div></div>
  </div>`;
  
  // Two column: Card Lines + Graders
  const byLine = groupBy(data, r=>r.line);
  const byGrader = groupBy(data, r=>r.grader);
  
  const lineColors = {'Hyper Battle':'var(--gold)','Miracle Battle':'var(--purple)',

    'Berry Match':'var(--red)','Episode Selection':'var(--text-dim)'};
  const graderColors = {PSA:'var(--blue)',CGC:'var(--orange)',BGS:'var(--purple)',ARS:'var(--green)',Raw:'var(--text-dim)'};
  
  html += `<div class="two-col">`;
  
  // Card Lines
  html += `<div class="section"><div class="section-title">CARD LINES BY VOLUME</div><div class="section-body"><div class="bar-chart">`;
  const maxLineCount = Math.max(...Object.values(byLine).map(a=>a.length));
  Object.entries(byLine).sort((a,b)=>b[1].length-a[1].length).forEach(([line, recs]) => {
    const p = recs.map(r=>r.price);
    html += `<div class="bar-row">
      <span class="bar-label">${line}</span>
      ${pctBar(recs.length, maxLineCount, lineColors[line]||'var(--text-dim)')}
      <span class="bar-value">${fmt(median(p))} med</span>
    </div>`;
  });
  html += `</div></div></div>`;
  
  // Graders
  html += `<div class="section"><div class="section-title">GRADERS BY VOLUME</div><div class="section-body"><div class="bar-chart">`;
  const maxGraderCount = Math.max(...Object.values(byGrader).map(a=>a.length));
  Object.entries(byGrader).sort((a,b)=>b[1].length-a[1].length).forEach(([g, recs]) => {
    const p = recs.map(r=>r.price);
    html += `<div class="bar-row">
      <span class="bar-label">${g}</span>
      ${pctBar(recs.length, maxGraderCount, graderColors[g]||'var(--text-dim)')}
      <span class="bar-value">${fmt(median(p))} med</span>
    </div>`;
  });
  html += `</div></div></div>`;
  
  html += `</div>`; // end two-col
  
  // Character breakdown table
  const byChar = groupBy(data.filter(r=>r.char), r=>r.char);
  const charEntries = Object.entries(byChar).sort((a,b)=>b[1].length-a[1].length).slice(0,15);
  
  html += `<div class="section"><div class="section-title">CHARACTERS — WHO MOVES THE MARKET</div><div class="section-body">
    <table class="data-table"><thead><tr>
      <th>Character</th><th class="num">Count</th><th class="num">Share</th>
      <th class="num">Avg</th><th class="num">Median</th><th class="num">Max</th><th class="num">Total $</th>
    </tr></thead><tbody>`;
  charEntries.forEach(([c, recs]) => {
    const p = recs.map(r=>r.price);
    html += `<tr>
      <td>${c}</td><td class="num">${recs.length}</td><td class="num pct">${(recs.length/data.length*100).toFixed(1)}%</td>
      <td class="num price">${fmt(avg(p))}</td><td class="num price">${fmt(median(p))}</td>
      <td class="num price">${fmt(Math.max(...p))}</td><td class="num price">${fmt(sum(p))}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;
  
  // Timeline — weekly volume & median price
  const byWeek = groupBy(data.filter(r=>r.week), r=>r.week);
  const weeks = Object.keys(byWeek).sort();
  // Filter out weeks with very few listings (pre-2026)
  const mainWeeks = weeks.filter(w => w >= '2026-02');
  
  html += `<div class="section"><div class="section-title">WEEKLY TREND — VOLUME & MEDIAN PRICE</div><div class="section-body">`;
  
  if (mainWeeks.length > 0) {
    const wData = mainWeeks.map(w => ({
      w, count: byWeek[w].length,
      med: median(byWeek[w].map(r=>r.price)),
      total: sum(byWeek[w].map(r=>r.price))
    }));
    
    const maxCount = Math.max(...wData.map(d=>d.count));
    const maxMed = Math.max(...wData.map(d=>d.med));
    const svgW = 900, svgH = 200, padL = 50, padR = 20, padT = 20, padB = 40;
    const chartW = svgW - padL - padR;
    const chartH = svgH - padT - padB;
    const barW = Math.max(8, chartW / wData.length - 4);
    
    html += `<svg viewBox="0 0 ${svgW} ${svgH}" class="timeline-svg" preserveAspectRatio="xMidYMid meet">`;
    
    // Y axis labels (count)
    for (let i = 0; i <= 4; i++) {
      const y = padT + chartH - (chartH * i / 4);
      const val = Math.round(maxCount * i / 4);
      html += `<text x="${padL-5}" y="${y+3}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="9" text-anchor="end">${val}</text>`;
      html += `<line x1="${padL}" y1="${y}" x2="${svgW-padR}" y2="${y}" stroke="var(--surface2)" stroke-width="1"/>`;
    }
    
    // Bars (count) and line (median price)
    let linePath = '';
    wData.forEach((d, i) => {
      const x = padL + (i + 0.5) * (chartW / wData.length);
      const barH = (d.count / maxCount) * chartH;
      const barY = padT + chartH - barH;
      
      html += `<rect x="${x - barW/2}" y="${barY}" width="${barW}" height="${barH}" 
                fill="var(--gold-dim)" opacity="0.7" rx="2">
                <title>${d.w}: ${d.count} listings, ${fmt(d.med)} median, ${fmt(d.total)} total</title></rect>`;
      
      // Median price line point
      const lineY = padT + chartH - (d.med / maxMed) * chartH;
      linePath += (i === 0 ? 'M' : 'L') + `${x},${lineY}`;
      html += `<circle cx="${x}" cy="${lineY}" r="3" fill="var(--gold-bright)">
                <title>${d.w}: ${fmt(d.med)} median</title></circle>`;
      
      // X axis labels (rotated)
      const label = d.w.slice(5); // "MM-DD"
      html += `<text x="${x}" y="${svgH - 5}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="8" text-anchor="middle" transform="rotate(-45,${x},${svgH-5})">${label}</text>`;
    });
    
    html += `<path d="${linePath}" fill="none" stroke="var(--gold-bright)" stroke-width="2"/>`;
    
    // Labels
    html += `<text x="${padL-5}" y="${padT-5}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="9" text-anchor="end">Vol</text>`;
    html += `<text x="${svgW-padR+5}" y="${padT-5}" fill="var(--gold-bright)" font-family="JetBrains Mono" font-size="9">Med $</text>`;
    
    html += `</svg>`;
    html += `<div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--gold-dim)"></span> Weekly Volume</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--gold-bright)"></span> Median Price</span>
    </div>`;
  }
  html += `</div></div>`;
  
  // Scatter: Grade vs Price, colored by grader
  html += `<div class="section"><div class="section-title">PRICE BY GRADE — PSA vs CGC vs BGS</div><div class="section-body">`;
  const graded = data.filter(r => r.grade && !isNaN(parseFloat(r.grade)));
  if (graded.length) {
    const svgW2 = 900, svgH2 = 320, padL2 = 60, padR2 = 30, padT2 = 20, padB2 = 40;
    const cW = svgW2 - padL2 - padR2, cH = svgH2 - padT2 - padB2;
    
    // Use log scale for price
    const maxP = Math.max(...graded.map(r=>r.price));
    const logMax = Math.log10(maxP + 1);
    const grades = [5,6,6.5,7,7.5,8,8.5,9,9.5,10];
    const gradeMin = 5, gradeMax = 10;
    
    html += `<svg viewBox="0 0 ${svgW2} ${svgH2}" class="scatter-svg" preserveAspectRatio="xMidYMid meet">`;
    
    // Grid lines
    [10,50,100,500,1000,5000,10000].forEach(v => {
      if (v <= maxP) {
        const y = padT2 + cH - (Math.log10(v+1)/logMax) * cH;
        html += `<line x1="${padL2}" y1="${y}" x2="${svgW2-padR2}" y2="${y}" stroke="var(--surface2)" stroke-width="1"/>`;
        html += `<text x="${padL2-5}" y="${y+3}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="9" text-anchor="end">${fmt(v)}</text>`;
      }
    });
    
    // X axis grade labels
    grades.forEach(g => {
      const x = padL2 + ((g - gradeMin) / (gradeMax - gradeMin)) * cW;
      html += `<text x="${x}" y="${svgH2-10}" fill="var(--text-dim)" font-family="JetBrains Mono" font-size="10" text-anchor="middle">${g}</text>`;
    });
    
    // Plot dots — CGC first (behind), PSA on top
    const dotOrder = ['BGS','Raw','CGC','PSA'];
    const colorMap = {PSA:'#4080c0',CGC:'#c07030',BGS:'#8060b0',Raw:'#8a8060',ARS:'#5a9a40'};
    
    dotOrder.forEach(grp => {
      graded.filter(r => r.grader === grp).forEach(r => {
        const g = parseFloat(r.grade);
        const x = padL2 + ((g - gradeMin) / (gradeMax - gradeMin)) * cW + (Math.random()-0.5)*12;
        const y = padT2 + cH - (Math.log10(r.price+1)/logMax) * cH;
        html += `<circle cx="${x}" cy="${y}" r="4" fill="${colorMap[grp]||'#8a8060'}" opacity="0.6">
                  <title>${r.grader} ${r.grade} | ${fmt(r.price)} | ${r.char}</title></circle>`;
      });
    });
    
    html += `</svg>`;
    html += `<div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#4080c0"></span> PSA</span>
      <span class="legend-item"><span class="legend-dot" style="background:#c07030"></span> CGC</span>
      <span class="legend-item"><span class="legend-dot" style="background:#8060b0"></span> BGS</span>
    </div>`;
  }
  html += `</div></div>`;
  
  // Card Year vintage premium
  const byYear = groupBy(data.filter(r=>r.year), r=>r.year);
  const yearEntries = Object.entries(byYear).sort((a,b)=>a[0].localeCompare(b[0]));
  
  html += `<div class="section"><div class="section-title">VINTAGE PREMIUM — PRICE BY CARD YEAR</div><div class="section-body">
    <table class="data-table"><thead><tr>
      <th>Year</th><th class="num">Count</th><th class="num">Avg</th><th class="num">Median</th><th class="num">Max</th>
    </tr></thead><tbody>`;
  yearEntries.forEach(([y, recs]) => {
    const p = recs.map(r=>r.price);
    const isVintage = parseInt(y) <= 2001;
    html += `<tr>
      <td${isVintage?' style="color:var(--gold-bright);font-weight:700"':''}>${y}</td>
      <td class="num">${recs.length}</td>
      <td class="num price">${fmt(avg(p))}</td><td class="num price">${fmt(median(p))}</td>
      <td class="num price">${fmt(Math.max(...p))}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;
  
  // Top sellers
  const bySeller = groupBy(data.filter(r=>r.seller), r=>r.seller);
  const sellerEntries = Object.entries(bySeller).sort((a,b)=>b[1].length-a[1].length).slice(0,12);
  
  html += `<div class="section"><div class="section-title">TOP SELLERS — WHO'S DRIVING SUPPLY</div><div class="section-body">`;
  const maxSellerCount = Math.max(...sellerEntries.map(([,r])=>r.length));
  html += `<div class="bar-chart">`;
  sellerEntries.forEach(([s, recs]) => {
    const p = recs.map(r=>r.price);
    // Color by primary grader
    const graderCounts = {};
    recs.forEach(r => graderCounts[r.grader] = (graderCounts[r.grader]||0)+1);
    const topGrader = Object.entries(graderCounts).sort((a,b)=>b[1]-a[1])[0][0];
    const color = topGrader === 'PSA' ? 'var(--blue)' : topGrader === 'CGC' ? 'var(--orange)' : 'var(--text-dim)';
    
    html += `<div class="bar-row">
      <span class="bar-label" title="${s}">${s.length > 14 ? s.slice(0,13)+'…' : s}</span>
      ${pctBar(recs.length, maxSellerCount, color)}
      <span class="bar-value">${fmt(avg(p))} avg</span>
    </div>`;
  });
  html += `</div>
    <div class="legend" style="margin-top:12px">
      <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span> Primarily PSA</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span> Primarily CGC</span>
    </div>
  </div></div>`;
  
  // Listing type
  const byLT = groupBy(data, r=>r.lt||'Other');
  html += `<div class="two-col">`;
  
  html += `<div class="section"><div class="section-title">LISTING TYPE</div><div class="section-body">
    <table class="data-table"><thead><tr><th>Type</th><th class="num">Count</th><th class="num">Avg</th><th class="num">Median</th></tr></thead><tbody>`;
  ['Auction','BIN','OBO'].forEach(lt => {
    if (byLT[lt]) {
      const p = byLT[lt].map(r=>r.price);
      html += `<tr><td>${lt}</td><td class="num">${byLT[lt].length}</td>
        <td class="num price">${fmt(avg(p))}</td><td class="num price">${fmt(median(p))}</td></tr>`;
    }
  });
  html += `</tbody></table></div></div>`;
  
  // Price distribution
  const brackets = [[0,25],[25,50],[50,100],[100,200],[200,500],[500,1000],[1000,5000],[5000,100000]];
  html += `<div class="section"><div class="section-title">PRICE DISTRIBUTION</div><div class="section-body"><div class="bar-chart">`;
  const maxBracket = Math.max(...brackets.map(([lo,hi]) => data.filter(r=>r.price>=lo && r.price<hi).length));
  let cumul = 0;
  brackets.forEach(([lo,hi]) => {
    const ct = data.filter(r=>r.price>=lo && r.price<hi).length;
    cumul += ct;
    const label = hi < 100000 ? `$${lo.toLocaleString()}–$${hi.toLocaleString()}` : `$${lo.toLocaleString()}+`;
    html += `<div class="bar-row">
      <span class="bar-label">${label}</span>
      ${pctBar(ct, maxBracket, 'var(--gold-dim)')}
      <span class="bar-value">${(ct/data.length*100).toFixed(0)}% (${ct})</span>
    </div>`;
  });
  html += `</div></div></div>`;
  html += `</div>`; // end two-col
  
  // Footer
  html += `<div style="text-align:center;padding:20px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)">
    Data: eBay Sold Comps · Parsed by SuperLuckyKat · Dashboard by Trubbish Bin
  </div>`;
  
  app.innerHTML = html;
}

render();
</script>
</body>
</html>
